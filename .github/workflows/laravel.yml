name: Laravel CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.2'
        coverage: none

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Create SQLite Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Install PHP Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Generate key
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: |
        if ! php artisan key:generate --force -v > key_gen.log 2>&1; then
          echo "Key generation failed!"
          cat key_gen.log
          LOG_CONTENT=$(cat key_gen.log)
          LOG_CONTENT="${LOG_CONTENT//%/%25}"
          LOG_CONTENT="${LOG_CONTENT//$'\n'/%0A}"
          LOG_CONTENT="${LOG_CONTENT//$'\r'/%0D}"
          echo "::error::Laravel bootstrap failed: $LOG_CONTENT"
          exit 1
        fi

    - name: Discover Packages
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: |
        if ! php artisan package:discover -v > discover.log 2>&1; then
          echo "Package discovery failed!"
          cat discover.log
          LOG_CONTENT=$(cat discover.log)
          LOG_CONTENT="${LOG_CONTENT//%/%25}"
          LOG_CONTENT="${LOG_CONTENT//$'\n'/%0A}"
          LOG_CONTENT="${LOG_CONTENT//$'\r'/%0D}"
          echo "::error::Package discovery failed: $LOG_CONTENT"
          exit 1
        fi

    - name: Execute tests
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: |
        if ! vendor/bin/phpunit > phpunit.log 2>&1; then
          echo "Tests failed!"
          cat phpunit.log
          LOG_CONTENT=$(cat phpunit.log)
          LOG_CONTENT="${LOG_CONTENT//%/%25}"
          LOG_CONTENT="${LOG_CONTENT//$'\n'/%0A}"
          LOG_CONTENT="${LOG_CONTENT//$'\r'/%0D}"
          echo "::error::Tests execution failed: $LOG_CONTENT"
          exit 1
        fi
